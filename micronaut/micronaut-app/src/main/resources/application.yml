micronaut:
  application:
    name: micronaut-books
  server:
    port: 8081
  caches:
    books:
      maximum-size: 200

datasources:
  default:
    url: jdbc:h2:mem:booksdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
    schema-generate: CREATE_DROP
    dialect: H2

endpoints:
  health:
    enabled: true
    sensitive: false

jpa:
  default:
    compile-time-hibernate-proxies: true
    entity-scan:
      packages: 'de.digitalservice.cop.micronaut'
    properties:
      hibernate:
        bytecode:
          provider: none
        hbm2ddl:
          auto: create-drop
        show_sql: false
